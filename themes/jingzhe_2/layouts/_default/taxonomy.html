{{ define "body_classes" }}page-taxonomy{{ end }}

{{ define "main" }}
<div class="summary">
  <h1 class="taxonomy-title">{{ .Title }}</h1>
  
  {{ if .Content }}
  <div class="taxonomy-content">{{ .Content }}</div>
  {{ end }}

  {{ range .Paginator.Pages }}
  <div class="summary-nrong img-hide">
    <div class="summary-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
    <div class="summary-description">{{ .Params.description }}</div>
    <div class="summary-date twitter-time" data-time="{{ .Date.Unix }}"></div>
  </div>
  {{ end }}

  {{ partial "pagination.html" . }}
</div>
{{ end }}
